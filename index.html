<!DOCTYPE html><html lang="pt-BR"><head><meta charset="UTF-8"/><meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no"/><meta name="theme-color" content="#1A1A2E"/><meta name="apple-mobile-web-app-capable" content="yes"/><meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/><meta name="apple-mobile-web-app-title" content="Calendário"/><title>Calendário 2026</title><style>@import url('https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap');:root{--navy:#1A1A2E;--navy2:#16213E;--navy3:#0F3460;--accent:#E94560;--bg:#F7F6F2;--surface:#fff;--muted:#9BA3AF;--line:#E5E2DB;--text:#1A1A2E;--other:#B0BAC6}*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--text);min-height:100dvh;overflow-x:hidden}.topbar{background:var(--navy);color:#fff;display:flex;align-items:center;justify-content:space-between;padding:14px 20px;padding-top:calc(14px + env(safe-area-inset-top));position:sticky;top:0;z-index:100}.topbar h1{font-family:'DM Serif Display',serif;font-size:20px}.nav-btns{display:flex;gap:8px}.nav-btn{background:rgba(255,255,255,.12);border:none;color:#fff;width:36px;height:36px;border-radius:50%;font-size:20px;cursor:pointer;display:flex;align-items:center;justify-content:center}.today-btn{font-size:12px;font-weight:700}.month-header{background:var(--navy);color:#fff;text-align:center;padding:4px 20px 18px}.month-title{font-family:'DM Serif Display',serif;font-size:32px;letter-spacing:1px}.month-sub{font-size:11px;color:rgba(255,255,255,.4);letter-spacing:2px;text-transform:uppercase;margin-top:2px}.dow-row{display:grid;grid-template-columns:repeat(7,1fr);background:var(--navy2);border-bottom:1px solid rgba(255,255,255,.08)}.dow-cell{text-align:center;padding:9px 0;font-size:10px;font-weight:600;letter-spacing:1.5px;color:rgba(255,255,255,.5);text-transform:uppercase}.dow-cell.wk{color:var(--accent)}.cal-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:1px;background:var(--line)}.day-cell{background:#fff;min-height:105px;padding:7px 7px 5px;cursor:pointer;position:relative;display:flex;flex-direction:column}.day-cell.weekend{background:#fff5f5}.day-cell.other{background:#f3f6fa}.day-cell.today{background:#eaf4ff}.day-cell.has-note::after{content:'';position:absolute;bottom:5px;right:5px;width:6px;height:6px;border-radius:50%;background:var(--accent)}.day-lbl{font-size:9px;color:var(--other);letter-spacing:1px;text-transform:uppercase;margin-bottom:1px}.day-num{font-family:'DM Serif Display',serif;font-size:21px;line-height:1}.day-cell.weekend .day-num{color:var(--accent)}.day-cell.other .day-num{color:var(--other);font-size:17px}.day-preview{font-size:10px;color:var(--muted);margin-top:4px;line-height:1.4;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;flex:1}.modal-overlay{display:none;position:fixed;inset:0;background:rgba(10,10,20,.55);backdrop-filter:blur(4px);z-index:200;align-items:flex-end}.modal-overlay.open{display:flex}.modal{background:var(--surface);width:100%;border-radius:24px 24px 0 0;padding-bottom:env(safe-area-inset-bottom);animation:slideUp .28s cubic-bezier(.32,1.1,.5,1);max-height:88dvh;display:flex;flex-direction:column}@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}.modal-handle{width:40px;height:4px;background:var(--line);border-radius:2px;margin:12px auto 0}.modal-header{display:flex;align-items:center;justify-content:space-between;padding:14px 20px 12px;border-bottom:1px solid var(--line)}.modal-title{font-family:'DM Serif Display',serif;font-size:22px}.modal-title span{font-family:'DM Sans',sans-serif;font-size:12px;font-weight:400;color:var(--muted);display:block;margin-top:1px}.modal-close{background:var(--bg);border:none;width:32px;height:32px;border-radius:50%;font-size:20px;cursor:pointer;color:var(--muted);display:flex;align-items:center;justify-content:center}.modal-body{padding:14px 20px;flex:1;overflow-y:auto}.note-textarea{width:100%;min-height:180px;border:1.5px solid var(--line);border-radius:14px;padding:14px;font-family:'DM Sans',sans-serif;font-size:15px;line-height:1.7;color:var(--text);background:var(--bg);resize:none;outline:none}.modal-actions{display:flex;gap:10px;padding:12px 20px 14px;border-top:1px solid var(--line)}.btn-save{flex:1;background:var(--navy);color:#fff;border:none;border-radius:14px;padding:14px;font-size:15px;font-weight:600;cursor:pointer}.btn-clear{background:var(--bg);color:var(--accent);border:1.5px solid var(--line);border-radius:14px;padding:14px 16px;font-size:14px;cursor:pointer}.footer{text-align:center;padding:18px;font-size:11px;color:var(--muted)}</style></head><body><div class="topbar"><div class="nav-btns"><button class="nav-btn" id="prevBtn">‹</button><button class="nav-btn" id="nextBtn">›</button></div><h1 id="topTitle">Calendário</h1><button class="nav-btn today-btn" id="todayBtn">HOJE</button></div><div class="month-header"><div class="month-title" id="monthTitle">—</div><div class="month-sub">Calendário · Anotações</div></div><div class="dow-row"><div class="dow-cell">Seg</div><div class="dow-cell">Ter</div><div class="dow-cell">Qua</div><div class="dow-cell">Qui</div><div class="dow-cell">Sex</div><div class="dow-cell wk">Sáb</div><div class="dow-cell wk">Dom</div></div><div class="cal-grid" id="calGrid"></div><div class="footer">Toque em qualquer dia para anotar</div><div class="modal-overlay" id="overlay"><div class="modal"><div class="modal-handle"></div><div class="modal-header"><div class="modal-title" id="mTitle">—<span id="mSub"></span></div><button class="modal-close" id="mClose">×</button></div><div class="modal-body"><textarea class="note-textarea" id="noteTA" placeholder="Escreva suas anotações..."></textarea></div><div class="modal-actions"><button class="btn-clear" id="btnClear">Apagar</button><button class="btn-save" id="btnSave">Salvar ✓</button></div></div></div><script>const MP=["Janeiro","Fevereiro","Março","Abril","Maio","Junho","Julho","Agosto","Setembro","Outubro","Novembro","Dezembro"];const MS=["jan","fev","mar","abr","mai","jun","jul","ago","set","out","nov","dez"];const DOW=["Dom","Seg","Ter","Qua","Qui","Sex","Sáb"];let cY=2026,cM=4,aKey=null;const gn=(y,m,d)=>localStorage.getItem(`n_${y}\_${m}_${d}`)||'';const sn=(y,m,d,v)=>v?localStorage.setItem(`n\_${y}_${m}\_${d}`,v):localStorage.removeItem(`n_${y}\_${m}_${d}`);const isToday=(y,m,d)=>{const t=new Date();return t.getFullYear()===y&&t.getMonth()===m&&t.getDate()===d};function build(){const y=cY,m=cM;document.getElementById('monthTitle').textContent=MP\[m\].toUpperCase()+'  '+y;document.getElementById('topTitle').textContent=MP\[m\]+' '+y;const g=document.getElementById('calGrid');g.innerHTML='';const fd=new Date(y,m,1).getDay();const off=fd===0?6:fd-1;const dim=new Date(y,m+1,0).getDate();const dip=new Date(y,m,0).getDate();const total=Math.ceil((off+dim)/7)\*7;for(let i=0;i<total;i++){const c=document.createElement('div');c.className='day-cell';const col=i%7;const isWk=col>=5;let cy2=y,cm2=m,cd,lbl='',isOth=false;if(i<off){cm2=(m+11)%12;cy2=cm2===11?y-1:y;cd=dip-off+i+1;lbl=MS\[cm2\];isOth=true;}else if(i>=off+dim){cm2=(m+1)%12;cy2=m===11?y+1:y;cd=i-off-dim+1;lbl=MS\[cm2\];isOth=true;}else{cd=i-off+1;}if(isOth)c.classList.add('other');else if(isWk)c.classList.add('weekend');if(isToday(cy2,cm2,cd)&&!isOth)c.classList.add('today');const note=gn(cy2,cm2,cd);if(note)c.classList.add('has-note');c.innerHTML=`${isOth?`<div class="day-lbl">${lbl}</div>`:''}<div class="day-num">${cd}</div>${note?`<div class="day-preview">${note.replace(/\n/g,'<br>')}</div>`:''}`;c.addEventListener('click',()=>open(cy2,cm2,cd));g.appendChild(c);}}function open(y,m,d){aKey={y,m,d};document.getElementById('mTitle').childNodes[0].textContent=`${DOW[new Date(y,m,d).getDay()]}, ${d} de ${MP[m]}`;document.getElementById('mSub').textContent=y;document.getElementById('noteTA').value=gn(y,m,d);document.getElementById('overlay').classList.add('open');setTimeout(()=>document.getElementById('noteTA').focus(),320);}function close(){document.getElementById('overlay').classList.remove('open');aKey=null;}document.getElementById('btnSave').addEventListener('click',()=>{if(!aKey)return;sn(aKey.y,aKey.m,aKey.d,document.getElementById('noteTA').value.trim());close();build();});document.getElementById('btnClear').addEventListener('click',()=>{document.getElementById('noteTA').value='';});document.getElementById('mClose').addEventListener('click',close);document.getElementById('overlay').addEventListener('click',e=>{if(e.target===document.getElementById('overlay'))close();});document.getElementById('prevBtn').addEventListener('click',()=>{cM--;if(cM<0){cM=11;cY--;}build();});document.getElementById('nextBtn').addEventListener('click',()=>{cM++;if(cM>11){cM=0;cY++;}build();});document.getElementById('todayBtn').addEventListener('click',()=>{const t=new Date();cY=t.getFullYear();cM=t.getMonth();build();});build();</script></body></html>
